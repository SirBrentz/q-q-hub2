<script>
/* ═══════════════════════════════════════════════════════════════════════════
   TRACKING MODULE — Get Started Flow
   ═══════════════════════════════════════════════════════════════════════════ */
window.QTRACK_CONFIG = {
  WEBHOOK_URL: "https://script.google.com/macros/s/AKfycbzGh0miR8ERrU2gK-NVhwaovEI6CiGp7v6FOHXopoSpEgLuEgrmf0X2YhEqLz1c12Lw/exec",
  SHARED_SECRET: "qdgt-7k9m-trk-ax42-2026",
  // ─── A/B EXPERIMENT (set to null to disable variant assignment) ───
  // When set, assigns each visitor to one variant deterministically (hash of vid)
  // and persists in localStorage so the same person sees the same variant on return.
  // Format: { name: 'experiment_name', variants: ['control', 'variant_a', ...] }
  // Example: { name: 'hero_v2', variants: ['control', 'variant_a'] }
  AB_EXPERIMENT: null,
};

(function() {
  // Visitor ID (persistent per browser — same person always gets same row)
  var visitorId = localStorage.getItem('qtrack_vid');
  if (!visitorId) {
    visitorId = Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('qtrack_vid', visitorId);
  }
  var sessionStart = Date.now();

  // ─── A/B variant assignment (deterministic per visitor) ───
  // Returns "experiment_name:variant_name" or "" if no experiment is configured.
  // Same visitorId always gets the same variant for a given experiment.
  function getVariant() {
    var exp = window.QTRACK_CONFIG.AB_EXPERIMENT;
    if (!exp || !exp.name || !Array.isArray(exp.variants) || exp.variants.length < 2) return '';
    var key = 'qtrack_var_' + exp.name;
    var assigned = localStorage.getItem(key);
    if (!assigned || exp.variants.indexOf(assigned) === -1) {
      // Hash visitorId for deterministic bucket (so the same person always lands in the same arm)
      var h = 0;
      for (var i = 0; i < visitorId.length; i++) h = ((h << 5) - h + visitorId.charCodeAt(i)) | 0;
      assigned = exp.variants[Math.abs(h) % exp.variants.length];
      localStorage.setItem(key, assigned);
    }
    return exp.name + ':' + assigned;
  }
  window._qtrack_variant = getVariant();

  // ─── UTM capture ───
  var params = new URLSearchParams(window.location.search);
  window._qtrack_utms = {
    utm_source: params.get('utm_source') || '',
    utm_medium: params.get('utm_medium') || '',
    utm_campaign: params.get('utm_campaign') || '',
  };

  // ─── Location capture (tries multiple services, falls back gracefully) ───
  window._qtrack_geo = { city: '', region: '', country: '' };
  (function resolveGeo() {
    var apis = [
      { url: 'https://get.geojs.io/v1/ip/geo.json', map: function(d) { return { city: d.city || '', region: d.region || '', country: d.country || '' }; }},
      { url: 'https://ipapi.co/json/', map: function(d) { return { city: d.city || '', region: d.region || '', country: d.country_name || '' }; }},
      { url: 'https://freeipapi.com/api/json', map: function(d) { return { city: d.cityName || '', region: d.regionName || '', country: d.countryName || '' }; }},
    ];
    function tryNext(i) {
      if (i >= apis.length) return;
      fetch(apis[i].url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var mapped = apis[i].map(data);
          if (mapped.city || mapped.region) {
            window._qtrack_geo = mapped;
            if (window.track) window.track('location_resolved', mapped);
          } else {
            tryNext(i + 1);
          }
        })
        .catch(function() { tryNext(i + 1); });
    }
    tryNext(0);
  })();

  // ─── Question timer ───
  window._qtrack_questionStart = null;
  window._qtrack_questionTimes = {};
  window._qtrack_currentQuestion = null;

  window._qtrack_startQuestion = function(questionId) {
    // Record time spent on previous question
    if (window._qtrack_currentQuestion && window._qtrack_questionStart) {
      var elapsed = Math.round((Date.now() - window._qtrack_questionStart) / 1000);
      var prev = window._qtrack_currentQuestion;
      window._qtrack_questionTimes[prev] = (window._qtrack_questionTimes[prev] || 0) + elapsed;
    }
    window._qtrack_currentQuestion = questionId;
    window._qtrack_questionStart = Date.now();
  };

  // ─── Current screen state (for abandonment) ───
  window._qtrack_screen = 'intake';
  window._qtrack_currentStep = null;

  // ─── Fire-and-forget event sender ───
  window.track = function(event, data) {
    if (!window.QTRACK_CONFIG.WEBHOOK_URL || !window.QTRACK_CONFIG.SHARED_SECRET) return;
    var payload = {
      secret: window.QTRACK_CONFIG.SHARED_SECRET,
      session_id: visitorId,
      event: event,
      timestamp: new Date().toISOString(),
      elapsed_sec: Math.round((Date.now() - sessionStart) / 1000),
      referrer: document.referrer || 'direct',
      user_agent: navigator.userAgent,
      viewport: window.innerWidth + 'x' + window.innerHeight,
      path: window.location.pathname,
      utms: window._qtrack_utms,
      geo: window._qtrack_geo,
      variant: window._qtrack_variant || '',
      data: data || {},
    };
    try {
      fetch(window.QTRACK_CONFIG.WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        keepalive: true,
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload),
      });
    } catch(e) { /* silent */ }
  };

  // Fire page load with UTMs
  if (document.readyState !== 'loading') {
    window.track('page_loaded', { utms: window._qtrack_utms });
  } else {
    document.addEventListener('DOMContentLoaded', function() { window.track('page_loaded', { utms: window._qtrack_utms }); });
  }

  // Fire page unload with abandonment data and question times
  window.addEventListener('beforeunload', function() {
    // Finalize current question time
    if (window._qtrack_currentQuestion && window._qtrack_questionStart) {
      var elapsed = Math.round((Date.now() - window._qtrack_questionStart) / 1000);
      var prev = window._qtrack_currentQuestion;
      window._qtrack_questionTimes[prev] = (window._qtrack_questionTimes[prev] || 0) + elapsed;
    }
    window.track('page_unloaded', {
      total_duration_sec: Math.round((Date.now() - sessionStart) / 1000),
      abandoned_at: window._qtrack_screen === 'guide'
        ? 'Guide Step ' + (window._qtrack_currentStep || 0)
        : 'Question: ' + (window._qtrack_currentQuestion || 'loading'),
      question_times: window._qtrack_questionTimes,
    });
  });

  // ─── Calendly booking listener ───
  // Calendly fires postMessage events when users interact with the embedded iframe.
  // We only care about the "event_scheduled" event — meaning they confirmed a booking.
  window.addEventListener('message', function(e) {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.event === 'calendly.event_scheduled') {
      if (window.track) window.track('demo_scheduled');
    }
  });
})();
</script>

        width: "100%", padding: "16px 20px", border: "none", background: "transparent",
        cursor: "pointer", fontFamily: "inherit", textAlign: "left",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 14, flexShrink: 0 }}>🔴</span>
          <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{symptom}</span>
        </div>
        <span style={{
          fontSize: 18, color: C.textDim, transition: "transform 0.2s ease",
          transform: open ? "rotate(45deg)" : "none",
        }}>+</span>
      </button>
      {open && (
        <div style={{ padding: "0 20px 18px", display: "flex", flexDirection: "column", gap: 12 }}>
          {causes.map((c, i) => (
            <div key={i} style={{ paddingLeft: 12, borderLeft: `2px solid ${C.amberLight}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.amber }}>{c.title}</div>
              <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, marginTop: 3 }}>{c.fix}</div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   INTAKE SCREEN
   ═══════════════════════════════════════════════════════════════════════════ */

function IntakeScreen({ onComplete }) {
  const [answers, setAnswers] = useState({});
  const [currentQ, setCurrentQ] = useState(0);
  const [showCalendly, setShowCalendly] = useState(false);
  const [confirmedVal, setConfirmedVal] = useState(null);

  const q = QUESTIONS[currentQ];
  const allDone = Object.keys(answers).length === QUESTIONS.length;

  // Clear confirmed state on question change
  useEffect(() => { setConfirmedVal(null); }, [currentQ]);

  // ─── TRACKING OBSERVERS ───
  // Track intake start once
  useEffect(() => {
    if (window.track) window.track('intake_started');
    window._qtrack_screen = 'intake';
  }, []);

  // Track each question being viewed + start timer
  useEffect(() => {
    var qId = QUESTIONS[currentQ].id;
    if (window._qtrack_startQuestion) window._qtrack_startQuestion(qId);
    if (window.track) window.track('question_viewed', { question_index: currentQ, question_id: qId });
  }, [currentQ]);

  // Track each answer submission
  useEffect(() => {
    if (!window.track) return;
    Object.keys(answers).forEach(key => {
      const prev = window._qtrack_lastAnswers || {};
      if (prev[key] !== answers[key]) {
        window.track('answer_submitted', { question_id: key, answer: answers[key] });
      }
    });
    window._qtrack_lastAnswers = { ...answers };
  }, [answers]);

  // Track blocking gate shown
  const isBlockedForTracking = q.blocking && answers[q.id] && (Array.isArray(q.blocking) ? q.blocking.includes(answers[q.id]) : q.blocking === answers[q.id]);
  useEffect(() => {
    if (window.track && isBlockedForTracking) window.track('gate_shown', { question_id: q.id, answer: answers[q.id] });
  }, [isBlockedForTracking, q.id]);

  // Track Calendly embed open
  useEffect(() => {
    if (window.track && showCalendly) window.track('clicked_book_demo');
  }, [showCalendly]);
  // ─── END TRACKING ───

  // Gate is derived — no separate state, no intermediate render
  const currentAnswer = answers[q.id];
  const isBlocked = q.blocking && currentAnswer && (Array.isArray(q.blocking) ? q.blocking.includes(currentAnswer) : q.blocking === currentAnswer);

  const answer = (val) => {
    if (q.multiSelect) {
      // Toggle checkbox values, store as comma-separated
      setAnswers(prev => {
        const current = (prev[q.id] || "").split(",").filter(Boolean);
        const next = current.includes(val) ? current.filter(v => v !== val) : [...current, val];
        return { ...prev, [q.id]: next.join(",") };
      });
      return; // Don't auto-advance on multi-select
    }
    setConfirmedVal(val);
    const newAnswers = { ...answers, [q.id]: val };
    // If they already have an account, MD info was collected at signup — skip that question
    if (q.id === "hasAccount" && val === "yes") {
      newAnswers.hasMedDirector = "yes";
    }
    setAnswers(newAnswers);
    const b = q.blocking;
    if (b && (Array.isArray(b) ? b.includes(val) : b === val)) return;
    if (currentQ < QUESTIONS.length - 1) {
      const skip = (q.id === "hasAccount" && val === "yes") ? 2 : 1;
      setTimeout(() => setCurrentQ(Math.min(currentQ + skip, QUESTIONS.length - 1)), 350);
    }
  };

  const passGate = () => {
    const passingVal = q.options.find(o => !(Array.isArray(q.blocking) ? q.blocking.includes(o.value) : q.blocking === o.value));
    const newAnswers = { ...answers, [q.id]: passingVal ? passingVal.value : "yes" };
    // Same skip logic if they just created an account
    if (q.id === "hasAccount") {
      newAnswers.hasMedDirector = "yes";
    }
    setAnswers(newAnswers);
    const skip = (q.id === "hasAccount") ? 2 : 1;
    setTimeout(() => setCurrentQ(prev => Math.min(prev + skip, QUESTIONS.length - 1)), 10);
  };

  const goBack = () => {
    if (isBlocked) { setAnswers(prev => { const n = { ...prev }; delete n[q.id]; return n; }); return; }
    if (currentQ > 0) {
      // Skip back over hasMedDirector if it was auto-filled because hasAccount=yes
      const prevQ = (currentQ === 2 && answers.hasAccount === "yes") ? 0 : currentQ - 1;
      setCurrentQ(prevQ);
    }
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "40px 20px",
    }}>
      <div style={{ maxWidth: showCalendly ? 680 : 480, width: "100%", transition: "max-width 0.3s ease" }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <Logo size={36} />
          <h1 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "16px 0 6px", letterSpacing: "-0.02em" }}>
            Plugin Setup Guide
          </h1>
          <p style={{ fontSize: 14, color: C.textMuted, margin: 0, lineHeight: 1.5 }}>
            A few quick questions so we show you exactly what you need.
          </p>
        </div>

        {/* Progress */}
        <div style={{ display: "flex", gap: 4, marginBottom: 28 }}>
          {QUESTIONS.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 3, borderRadius: 2,
              background: i <= currentQ ? C.accent : C.border,
              transition: "background 0.3s ease",
            }} />
          ))}
        </div>

        {/* Blocking gate — context changes based on which question we're on */}
        {isBlocked ? (
          <div key="gate" className="fade-in">
            {q.id === "hasAccount" ? (
              /* ── NO ACCOUNT ── */
              <div style={{ borderRadius: 12, border: "1px solid rgba(77,61,113,.12)", overflow: "hidden" }}>
                <div style={{ padding: "24px 24px 20px", background: "linear-gradient(135deg, rgba(77,61,113,.06) 0%, rgba(77,61,113,.1) 100%)" }}>
                  <div style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 6 }}>Let's get you set up</div>
                  <p style={{ fontSize: 14, color: C.textMuted, margin: 0, lineHeight: 1.6 }}>
                    Create a free Qualiphy account — no signup fees, no monthly charges. The registration process walks you through everything. Once you're done, come back here and continue.
                  </p>
                </div>
                <div style={{ padding: "20px 24px", background: "#fff", display: "flex", flexDirection: "column", gap: 10 }}>
                  <a href="https://app.qualiphy.me/signup" target="_blank" rel="noopener" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "14px 22px", borderRadius: 10, background: C.accent, color: "#fff", fontFamily: "inherit", fontSize: 15, fontWeight: 600, textDecoration: "none" }}>
                    Create Account ↗
                  </a>
                  <button onClick={() => setShowCalendly(true)} style={{ display: showCalendly ? "none" : "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "12px 22px", borderRadius: 10, background: C.bgMuted, color: C.textMuted, fontFamily: "inherit", fontSize: 14, fontWeight: 600, border: "none", cursor: "pointer", width: "100%", transition: "background .15s" }}>
                      Not sure yet? Book a demo
                    </button>
                    {showCalendly && (
                      <div style={{ borderRadius: 10, overflow: "hidden", border: "1px solid " + C.border, background: "#fff" }}>
                        <iframe src="https://calendly.com/d/cxsg-tnc-5sf/qualiphy-quidget-demo?embed_type=Inline&hide_gdpr_banner=1" style={{ width: "100%", height: 680, border: "none", display: "block" }} />
                      </div>
                    )}
                </div>
              </div>
            ) : q.id === "hasMedDirector" ? (
              /* ── NO MEDICAL DIRECTOR ── */
              <div style={{ borderRadius: 12, border: "1px solid rgba(77,61,113,.12)", overflow: "hidden" }}>
                <div style={{ padding: "24px 24px 20px", background: "linear-gradient(135deg, rgba(77,61,113,.06) 0%, rgba(77,61,113,.1) 100%)" }}>

                  <p style={{ fontSize: 14, color: C.textMuted, margin: 0, lineHeight: 1.6 }}>
                    A Medical Director is required for practices that perform or advertise medical procedures. They provide oversight, sign treatment protocols, and ensure compliance with state regulations.

                          </span>
                          {opt.label}
                        </span>
                      </OptionBtn>
                    );
                  })
                ) : (
                  q.options.map(opt => (
                    <OptionBtn key={opt.value} selected={answers[q.id] === opt.value} confirmed={confirmedVal === opt.value} onClick={() => answer(opt.value)} desc={opt.desc}>

            </div>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 28 }}>

                <Btn variant="ghost" onClick={() => window.location.href = "../"} small>← Back</Btn>

                <Btn onClick={() => onComplete(answers)}>Show my setup guide →</Btn>
              ) : q.multiSelect && answers[q.id] ? (
                <Btn variant="secondary" onClick={() => { const skip = (currentQ === 0 && answers.hasAccount === "yes") ? 2 : 1; setCurrentQ(Math.min(currentQ + skip, QUESTIONS.length - 1)); }} small>Next →</Btn>

                <Btn variant="secondary" onClick={() => { const skip = (currentQ === 0 && answers.hasAccount === "yes") ? 2 : 1; setCurrentQ(Math.min(currentQ + skip, QUESTIONS.length - 1)); }} small>Next →</Btn>

            </div>
          </>
        )}
      </div>

}

    window._qtrack_screen = 'guide';
    // Finalize last question time before leaving intake
    if (window._qtrack_currentQuestion && window._qtrack_questionStart) {
      var elapsed = Math.round((Date.now() - window._qtrack_questionStart) / 1000);
      var prev = window._qtrack_currentQuestion;
      window._qtrack_questionTimes[prev] = (window._qtrack_questionTimes[prev] || 0) + elapsed;
      window._qtrack_questionStart = null;
    }
    if (window.track) window.track('intake_completed', {
      exam_types: answers.examType || '',
      has_account: answers.hasAccount || '',
      has_med_director: answers.hasMedDirector || '',
      has_api_key: answers.hasApiKey || '',
      has_wordpress: answers.hasWordPress || '',
      has_woo: answers.hasWoo || '',
      has_subscriptions: answers.hasSubscriptions || '',
      has_products: answers.hasProducts || '',

            For products with multiple dose variations, enable the <strong>Questionnaire</strong> on the product edit page. This replaces the dropdown with a guided flow: "Have you taken this before?" → "Current dose" → "Stay, increase, or decrease." Customize text and colors in Settings → Language.
          </p>
        </Card>
      )}

      <Card style={{ marginTop: 12 }}>
        <h4 style={{ margin: "0 0 12px", fontSize: 14 }}>Common issues after setup</h4>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>"Please log in to view this order" on the thank-you page</div>
            <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, marginTop: 3 }}>
              The plugin forces account creation at checkout, but if your WooCommerce settings conflict (e.g., guest checkout is partially enabled, or a caching plugin serves stale pages), the patient lands on a login wall instead of seeing the exam launch. Fix: go to <strong>WooCommerce → Settings → Accounts & Privacy</strong> and enable "Allow customers to create an account during checkout." Also clear any page cache after setup.
            </div>
          </div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Exam invite not firing after checkout</div>
            <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, marginTop: 3 }}>
              The most common cause is a missing or misconfigured payment gateway. The exam invite fires on <em>payment complete</em>, not on order creation. If the payment gateway isn't confirming the charge, the invite never sends. Verify your gateway is processing test transactions successfully before diagnosing the plugin.
            </div>
          </div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Renaming the product breaks the consultation</div>
            <div style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, marginTop: 3 }}>
              You can safely rename the product title and change the URL slug — the Qualiphy link is stored as metadata on the product, not tied to the name. If something breaks after renaming, it's usually a caching issue. Clear your site cache and test again. If it persists, uninstall and reactivate the plugin to re-run the setup wizard (your data is preserved).
            </div>
          </div>
        </div>
      </Card>

      <Card style={{ marginTop: 12 }}>
        <h4 style={{ margin: "0 0 10px", fontSize: 14 }}>Tip: Direct-to-checkout URL for in-clinic use</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
          If your staff processes consultations in-clinic (e.g., a nurse at the front desk), you can create a direct link that adds the consultation to cart and jumps straight to checkout: <code>yoursite.com/checkout/?add-to-cart=PRODUCT_ID</code>. Replace <code>PRODUCT_ID</code> with the WooCommerce product ID (found in the URL when editing the product). Bookmark this for your team — it cuts the patient flow down to one step for staff-initiated consultations.
        </p>
      </Card>

      <Callout type="success">
        Your store is ready. Need help? <strong>support@qualiphy.me</strong> or <strong>(424) 320-9958</strong>.
      </Callout>
    </>
  )});

  // 9 — Troubleshooting
  steps.push({ id: "troubleshooting", title: "Troubleshooting", render: () => (
    <>
      <p>If something isn't working after setup, find your symptom below. These cover the most common issues we see.</p>

      <TroubleshootItem
        symptom="Exam invite never sends after checkout"
        causes={[
          { title: "No payment gateway", fix: "The invite fires on payment confirmation. If no gateway is configured (or the gateway fails silently), the invite never triggers. Go to WooCommerce → Settings → Payments and verify your gateway is active and processing test orders." },
          { title: "Free exam not configured correctly", fix: "For $0 consultations, make sure the product was imported with the 'Free Instant Checkout' option in the import wizard. Free exams fire on order creation, not payment — but only if WooCommerce recognizes the order total as $0." },
          { title: "Caching plugin interference", fix: "Aggressive caching (especially database or object caching) can prevent WooCommerce AJAX calls from working. Exclude /checkout/ and /my-account/ from your cache. If using W3 Total Cache, disable page cache for logged-in users." },
        ]}
      />

      <TroubleshootItem
        symptom="Patient sees 'Please log in to view this order' on the thank-you page"
        causes={[
          { title: "Account creation setting conflict", fix: "Go to WooCommerce → Settings → Accounts & Privacy. Enable 'Allow customers to create an account during checkout.' The Qualiphy plugin forces account creation, but this WooCommerce setting must also be enabled for it to work." },
          { title: "Page cache serving stale content", fix: "Clear your entire site cache after installing the plugin. Some caching plugins serve the thank-you page from cache before the order session is established." },
        ]}
      />

      <TroubleshootItem
        symptom="Exam launch popup doesn't appear after checkout"
        causes={[
          { title: "Auto-launch is disabled", fix: "Go to Qualiphy → Settings → General. Make sure 'Auto Launch Exams' is enabled. Also check the launch mode — 'Popup' shows the modal, 'Redirect' sends them directly to the meeting URL." },
          { title: "Invite was sent but meeting URL is missing", fix: "Check the WooCommerce order — look for a Qualiphy section with the invite status. If it says 'error', check the error message. Common cause: the patient's state isn't in your service area, or pharmacy routing failed for an Rx exam." },
        ]}
      />

      <TroubleshootItem
        symptom="Product page shows 'not available in your area' for all customers"
        causes={[
          { title: "Service area too narrow", fix: "Go to Qualiphy → Settings → Service Area and check your selected states. If a state isn't checked, patients in that state can't purchase." },
          { title: "Shipping zone misconfigured", fix: "The plugin auto-creates a 'Qualiphy Service Area' shipping zone. If it was accidentally deleted or modified, go to WooCommerce → Settings → Shipping and verify it exists with free shipping for your selected states. Or re-save your service area in Qualiphy settings to regenerate it." },
        ]}
      />

      {needsRx && (
        <TroubleshootItem
          symptom="Rx consultation approved but no prescription/tracking"
          causes={[
            { title: "Pharmacy routing not configured", fix: "Go to Qualiphy → Pharmacies and verify that the exam has a pharmacy assigned for the patient's state. If no pharmacy covers that state, the prescription can't be created." },
            { title: "Webhook not reaching your site", fix: "Prescription and tracking updates arrive via webhook. Go to Qualiphy → Settings → Advanced and verify the webhook URL is correct and reachable. Check if a security plugin (Wordfence, Sucuri) is blocking incoming POST requests to the webhook endpoint." },
          ]}
        />
      )}

      <Card style={{ marginTop: 4, background: C.accentLight, border: `1px solid ${C.accentMid}` }}>
        <h4 style={{ margin: "0 0 8px", fontSize: 14, color: C.accent }}>Still stuck?</h4>
        <p style={{ fontSize: 13, color: C.textBody, lineHeight: 1.6, margin: 0 }}>
          Contact us at <strong>support@qualiphy.me</strong> or <strong>(424) 320-9958</strong>. Include your site URL, which step you're on, and any error messages — screenshots help us diagnose faster. If you'd prefer our team handle setup entirely, let us know.
        </p>
      </Card>
    </>
  )});

  // ── Render ─────────────────────────────────────────────────────────────
  return (
    <div className="guide-layout" style={{ display: "flex", height: "100vh" }}>

      {/* Sidebar */}
      <aside className="guide-sidebar" style={{
        width: 280, flexShrink: 0, background: C.bgWhite, borderRight: `1px solid ${C.border}`,
        display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
        <div style={{ padding: "20px 20px 16px", borderBottom: `1px solid ${C.border}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Logo size={24} />
            <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>Qualiphy</span>
          </div>
          <p style={{ fontSize: 12, color: C.textMuted, margin: "8px 0 0" }}>Plugin Setup Guide</p>
        </div>

        <nav style={{ flex: 1, overflow: "auto", padding: "12px 12px" }}>
          {steps.map((step, i) => (
            <button key={step.id} onClick={() => { setActiveStep(i); scrollTop(); }} style={{
              display: "flex", alignItems: "flex-start", gap: 10,
              width: "100%", padding: "10px 10px", borderRadius: 8, border: "none",
              background: i === activeStep ? C.accentLight : "transparent",
              cursor: "pointer", textAlign: "left", fontFamily: "inherit",
              transition: "background 0.15s ease", marginBottom: 2,
            }}>
              <StepNum n={i + 1} active={i === activeStep} done={i < activeStep} />
              <span style={{
                fontSize: 13, fontWeight: i === activeStep ? 600 : 500,
                color: i === activeStep ? C.accent : i < activeStep ? C.green : C.textBody,
                lineHeight: 1.35, marginTop: 5,
              }}>{step.title}</span>
            </button>
          ))}
        </nav>

        <div className="sidebar-footer" style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}`, display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ display: "flex", gap: 6 }}>
            <Btn variant="ghost" onClick={onRestart} small>← Restart guide</Btn>
            <Btn variant="ghost" onClick={printAllSteps} small>🖨 Print</Btn>
          </div>
          <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.4 }}>
            Need help? <strong style={{ color: C.textMuted }}>support@qualiphy.me</strong>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="guide-main" ref={contentRef} style={{ flex: 1, overflow: "auto" }}>
        <div style={{
          position: "sticky", top: 0, zIndex: 10, padding: "14px 32px",
          background: C.bg + "ee", backdropFilter: "blur(8px)",
          borderBottom: `1px solid ${C.border}`,
          display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Pill>{steps[activeStep].title}</Pill>
            <span style={{ fontSize: 12, color: C.textDim }}>Step {activeStep + 1} of {steps.length}</span>
          </div>
          <div className="topbar-pills" style={{ display: "flex", gap: 4 }}>
            <SummaryPill label="Type" value={needsRx && needsGfe ? "Rx + GFE" : needsRx ? "Rx" : "GFE"} />
            {needsSubs && <SummaryPill label="Subscriptions" value="Yes" />}
          </div>
        </div>

        {printing ? (
          <div className="guide-content" style={{ maxWidth: 680, margin: "0 auto", padding: "32px 32px 80px" }}>
            {steps.map((step, i) => (
              <div key={step.id} style={{ marginBottom: 40, pageBreakInside: "avoid" }}>
                <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "0 0 8px", letterSpacing: "-0.02em" }}>
                  {step.title}
                </h2>
                <div style={{ fontSize: 14, color: C.textBody, lineHeight: 1.7, display: "flex", flexDirection: "column", gap: 16 }}>
                  {step.render()}
                </div>
                {i < steps.length - 1 && <hr style={{ border: "none", borderTop: "1px solid " + C.border, margin: "32px 0 0" }} />}
              </div>
            ))}
          </div>
        ) : (
        <div key={activeStep} className="fade-in guide-content" style={{ maxWidth: 680, margin: "0 auto", padding: "32px 32px 80px" }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "0 0 8px", letterSpacing: "-0.02em" }}>
            {steps[activeStep].title}
          </h2>
          <div style={{ fontSize: 14, color: C.textBody, lineHeight: 1.7, display: "flex", flexDirection: "column", gap: 16 }}>
            {steps[activeStep].render()}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 40, paddingTop: 24, borderTop: `1px solid ${C.border}` }}>
            <Btn variant="secondary" onClick={() => { setActiveStep(Math.max(0, activeStep - 1)); scrollTop(); }} disabled={activeStep === 0}>
              ← Previous
            </Btn>
            {activeStep < steps.length - 1 ? (
              <Btn onClick={() => { setActiveStep(activeStep + 1); scrollTop(); }}>
                Next: {steps[activeStep + 1].title} →
              </Btn>
            ) : (
              <Btn onClick={() => { if (window.track) window.track('guide_completed'); window.open("https://app.qualiphy.me", "_blank"); }}>
                Go to Qualiphy Dashboard →
              </Btn>
            )}
          </div>
        </div>
        )}
      </main>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   APP ROOT
   ═══════════════════════════════════════════════════════════════════════════ */

function App() {
  const [screen, setScreen] = useState("intake");
  const [answers, setAnswers] = useState(null);

  if (screen === "intake") {
    return <IntakeScreen onComplete={(a) => { setAnswers(a); setScreen("guide"); }} />;
  }
  return <GuideScreen answers={answers} onRestart={() => { setAnswers(null); setScreen("intake"); }} />;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
